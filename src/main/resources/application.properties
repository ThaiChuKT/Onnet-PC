spring.application.name=OnnetPC
server.port=${PORT:8080}
server.address=0.0.0.0

# DataSource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/onnetpc}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:Shiro}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:white}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.data-source-properties.zeroDateTimeBehavior=CONVERT_TO_NULL

# Flyway migrations (disabled - manually run migrations to avoid conflicts)
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:false}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.open-in-view=false
app.database.schema-repair.enabled=${APP_DATABASE_SCHEMA_REPAIR_ENABLED:true}

# Actuator
management.endpoints.web.exposure.include=health,info
spring.docker.compose.enabled=false

# Security / JWT
app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.access-token-expiration-minutes=${APP_JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:120}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000,https://onnetpc.com,https://www.onnetpc.com}

# PayPal
app.paypal.client-id=${APP_PAYPAL_CLIENT_ID:${PAYPAL_CLIENT_ID:}}
app.paypal.client-secret=${APP_PAYPAL_CLIENT_SECRET:${PAYPAL_CLIENT_SECRET:}}
app.paypal.base-url=${APP_PAYPAL_BASE_URL:${PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}}
app.paypal.webhook-id=${APP_PAYPAL_WEBHOOK_ID:${PAYPAL_WEBHOOK_ID:}}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:${FRONTEND_BASE_URL:http://localhost:5173}}
 
# Email verification
app.email.provider=${APP_EMAIL_PROVIDER:smtp}
app.email.verification.from=${APP_EMAIL_VERIFICATION_FROM:no-reply@onnetpc.local}
app.email.verification.expiry-minutes=${APP_EMAIL_VERIFICATION_EXPIRY_MINUTES:15}
app.email.resend.api-key=${APP_EMAIL_RESEND_API_KEY:${RESEND_API_KEY:}}
app.email.resend.from=${APP_EMAIL_RESEND_FROM:}
app.email.resend.base-url=${APP_EMAIL_RESEND_BASE_URL:https://api.resend.com}

# SMTP (configure with real provider credentials)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.protocol=smtp
spring.mail.username=${SPRING_MAIL_USERNAME:${GMAIL_SMTP_USERNAME:}}
spring.mail.password=${SPRING_MAIL_PASSWORD:${GMAIL_SMTP_APP_PASSWORD:}}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.ssl.protocols=${SPRING_MAIL_SMTP_SSL_PROTOCOLS:TLSv1.2}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_SMTP_WRITE_TIMEOUT:5000}
spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_SMTP_SSL_TRUST:smtp.gmail.com}
spring.mail.properties.mail.debug=${SPRING_MAIL_DEBUG:false}

# Moonlight / Sunshine integration
# The backend may run short Moonlight CLI commands such as pair/list when explicitly requested.
# Do not run STREAM from the backend during user sessions; the user's Moonlight client should own the stream.
app.moonlight.cli.enabled=true
# Use forward slashes to avoid escaping backslashes in properties
app.moonlight.cli.path=${APP_MOONLIGHT_CLI_PATH:C:/Program Files/Moonlight Game Streaming/Moonlight.exe}
app.moonlight.cli.timeout-seconds=${APP_MOONLIGHT_CLI_TIMEOUT_SECONDS:60}
app.moonlight.cli.allow-stream-command=${APP_MOONLIGHT_CLI_ALLOW_STREAM_COMMAND:true}
